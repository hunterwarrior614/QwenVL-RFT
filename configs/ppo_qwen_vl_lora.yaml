seed: 42
num_train_epochs: 1
data:
  train_file: data/wo_thinking_thyme_single_round-00000-of-00146.qwen_vl_ppo.jsonl
  train_size: 1000
  eval_size: 121
  test_size: 121
  split_seed: 42
  max_train_samples: null
  max_eval_samples: 64
  num_workers: 0
  image_max_longest_edge: 1024
model:
  base_model_name_or_path: ../Qwen/Qwen2.5-VL-3B-Instruct
  sft_adapter_path: outputs/sft/default/checkpoint-150/adapter
  torch_dtype: bfloat16
  attn_implementation: sdpa
  gradient_checkpointing: true
  trust_remote_code: false
  use_flash_attention_2: false
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules_regex: .*language_model\\.layers\\.\\d+\\.(self_attn\\.(q_proj|k_proj|v_proj|o_proj)|mlp\\.(gate_proj|up_proj|down_proj))$
generation:
  max_new_tokens: 16
  min_new_tokens: 1
  do_sample: true
  temperature: 0.7
  top_p: 0.9
  top_k: 0
  repetition_penalty: 1.0
  eval_max_new_tokens: 16
optimizer:
  learning_rate: 5.0e-06
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-08
  max_grad_norm: 1.0
ppo:
  # 含义解释见 src/qwen_vl_rl/config.py 中 PPOConfig 类
  per_device_prompt_batch_size: 1
  per_device_minibatch_size: 1
  ppo_epochs: 2
  cliprange: 0.2
  value_cliprange: 0.2
  vf_coef: 0.5
  kl_coef: 0.02
  gamma: 1.0
  lam: 0.95
  whiten_advantages: false
  entropy_coef: 0.0
logging:
  output_dir: outputs/ppo/default
  logging_steps: 1
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
